<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Subtle shine overlay -->
  <rect width="64" height="64" rx="14" fill="url(#shineGrad)"/>

  <!-- Resume page shape -->
  <rect x="14" y="10" width="28" height="36" rx="3" fill="white" opacity="0.95"/>

  <!-- Page fold corner -->
  <path d="M36 10 L42 10 L42 16 Z" fill="#bfdbfe" opacity="0.7"/>
  <path d="M36 10 L36 16 L42 16" fill="none" stroke="#93c5fd" stroke-width="0.8"/>

  <!-- Header bar on resume -->
  <rect x="17" y="14" width="16" height="3" rx="1.5" fill="#2563eb" opacity="0.85"/>

  <!-- Content lines -->
  <rect x="17" y="21" width="20" height="1.8" rx="0.9" fill="#94a3b8"/>
  <rect x="17" y="25" width="16" height="1.8" rx="0.9" fill="#94a3b8"/>
  <rect x="17" y="29" width="18" height="1.8" rx="0.9" fill="#94a3b8"/>

  <!-- Small skill tags on resume -->
  <rect x="17" y="33" width="7" height="5" rx="2" fill="#eff6ff"/>
  <rect x="26" y="33" width="7" height="5" rx="2" fill="#eff6ff"/>

  <!-- Bolt / forge accent — bottom right -->
  <circle cx="46" cy="46" r="12" fill="#0f172a" opacity="0.6"/>
  <circle cx="46" cy="46" r="11" fill="#1e3a8a"/>

  <!-- Lightning bolt inside circle -->
  <path d="M49 37 L43 46 L46.5 46 L43 55 L50 44 L46.5 44 Z"
        fill="white" opacity="0.95"/>
</svg>
